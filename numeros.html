<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador de Numeros Aleatórios</title>
    <link rel="stylesheet" href="./style.css">
    <script defer src="./numeros.js"></script>
</head>
<body class="sorteador">
    <header class="sorteador__header">
        <h1 class="sorteador__header">Sorteador de Números Aleatórios</h1>
    </header>
    <main class="sorteador__main">
        <section class="sorteador__intervalo intervalo">
            <label class="intervalo__label" for="valor-minimo">Valor minimo: <span class="intervalo__valor intervalo__valor--min"></span></label>
            <input class="intervalo__slider intervalo__slider--min" type="range" name="valor-minimo" min="1" max="100" value="1"/>

             <label class="intervalo__label" for="valor-maximo">Valor maximo:<span class="intervalo__valor intervalo__valor--max"></span></label>
        </section>
    </main>
    
</body>
</html>
